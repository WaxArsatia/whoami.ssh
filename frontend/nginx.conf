server {
    listen 80;
    listen [::]:80;
    server_name whoami.denis.my.id;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    server_name whoami.denis.my.id;

    ssl_certificate /etc/letsencrypt/live/whoami.denis.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoami.denis.my.id/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_dhparam /etc/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/whoami.denis.my.id/chain.pem;
    resolver 1.1.1.1 8.8.8.8;

    ssl_early_data on;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header QUIC-Status $quic always;

    quic_retry on;
    quic_gso on;

    root  /var/www/whoami-ssh;
    index index.html;

    access_log /var/log/nginx/whoami-ssh.access.log combined;
    error_log  /var/log/nginx/whoami-ssh.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        font/opentype
        font/eot
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
