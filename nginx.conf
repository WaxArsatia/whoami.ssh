server {
    listen 80 reuseport;
    listen [::]:80 reuseport;
    server_name denis.my.id www.denis.my.id;

    return 301 https://denis.my.id$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.denis.my.id;

    ssl_certificate     /etc/letsencrypt/live/denis.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/denis.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://denis.my.id$request_uri;
}

server {
    listen 443 ssl reuseport;
    listen [::]:443 ssl reuseport;
    http2 on;
    server_name denis.my.id;

    root /var/www/denis.my.id;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/denis.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/denis.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ =404;
    }
}
